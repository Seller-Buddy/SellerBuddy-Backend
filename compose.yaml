services:
  api:
    build:
      context: .
    image: shopbuddy-back:${SHOPBUDDY_VERSION:-local}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      APP_DB_PATH: /data/shopbuddy.db
      CHROMA_DB_PATH: /data/chroma_db
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    expose:
      - "8000"
    volumes:
      - shopbuddy_data:/data

  frontend:
    build:
      context: ./frontend
    image: sellerbuddy-frontend:${SHOPBUDDY_VERSION:-local}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3100"

  proxy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  shopbuddy_data:
